async function run() {
  addLog('Starting import of ' + WOS.length + ' work orders...');
  let imported=0, skipped=0, errors=0;
  const bs = 50;
  for (let i = 0; i < WOS.length; i += bs) {
    const batch = WOS.slice(i, i + bs);
    try {
      const r = await fetch('/api/ops/import-bolt', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workOrders:batch})});

        imported += (d.results.workOrders.imported || 0);
        skipped += (d.results.workOrders.skipped || 0);
        if (d.results.workOrders.errors) errors += d.results.workOrders.errors.length;
      }
    } catch(e) { errors += batch.length; addLog('Error: ' + e.message); }
    addLog('Batch ' + Math.ceil(i/bs+1) + '/' + Math.ceil(WOS.length/bs) + ' - imported:' + imported + ' skipped:' + skipped + ' errors:' + errors);
  }
  addLog('DONE! imported:' + imported + ' skipped:' + skipped + ' errors:' + errors);
}
run();
</script></body></html>
